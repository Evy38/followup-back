security:
    # ============================================================
    # 🔐 HASHAGE DES MOTS DE PASSE
    # ============================================================
    # Symfony choisit automatiquement l’algorithme le plus sûr
    password_hashers:
        App\Entity\User:
            algorithm: auto


    # ============================================================
    # 👤 PROVIDER UTILISATEUR
    # ============================================================
    # Définit comment Symfony retrouve un utilisateur
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email


    # ============================================================
    # 🔥 FIREWALLS
    # ============================================================
    firewalls:

        # ----------------------------
        # 🏥 HEALTHCHECK (PUBLIC)
        # ----------------------------
        health:
            pattern: ^/health
            stateless: true
            security: false

        # ----------------------------
        # 🔓 ROUTES DEV / DEBUG
        # ----------------------------
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false


        # ----------------------------
        # 🔓 SWAGGER / DOC API
        # ----------------------------
        swagger:
            pattern: ^/api/docs
            stateless: true
            security: false


        # ----------------------------
        # 🔐 AUTHENTIFICATION (LOGIN)
        # ----------------------------
        # Reçoit email + password
        # Génère un JWT si succès
        login:
            pattern: ^/api/login
            stateless: true
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            json_login:
                check_path: /api/login_check
                username_path: email
                password_path: password
                success_handler: App\Security\AuthenticationSuccessHandler
                failure_handler: lexik_jwt_authentication.handler.authentication_failure


        # ----------------------------
        # 🔄 REFRESH TOKEN
        # ----------------------------
        refresh:
            pattern: ^/api/token/refresh
            stateless: true
            security: false

        # ----------------------------
        # 🔐 FIREWALL PRINCIPAL API
        # ----------------------------
        # Toutes les routes /api/**
        # JWT obligatoire par défaut
        api:
            pattern: ^/api
            stateless: true
            jwt: ~


    # ============================================================
    # 🚦 CONTRÔLE D’ACCÈS (QUI A LE DROIT)
    # ============================================================
    # ⚠️ L’ordre est IMPORTANT (du plus spécifique au plus général)
    access_control:

        - { path: ^/api/debug, roles: PUBLIC_ACCESS }
        # 🔓 PUBLIC : création de compte
        - { path: ^/api/register, roles: PUBLIC_ACCESS }

        # 🔓 PUBLIC : login (JWT)
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }

        # 🔓 PUBLIC : vérification email (token unique)
        - { path: ^/api/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/api/verify-email/resend, roles: PUBLIC_ACCESS }

        # 🔓 PUBLIC : mot de passe oublié / reset
        - { path: ^/api/password/request, roles: PUBLIC_ACCESS }
        - { path: ^/api/password/reset, roles: PUBLIC_ACCESS }

        # 🔓 PUBLIC : refresh token
        - { path: ^/api/token/refresh, roles: PUBLIC_ACCESS }

        # 🔓 PUBLIC : OAuth Google
        - { path: ^/auth/google, roles: PUBLIC_ACCESS }
        - { path: ^/google/callback, roles: PUBLIC_ACCESS }
        
        # 🏥 PUBLIC : Healthcheck
        - { path: ^/health, roles: PUBLIC_ACCESS }
        - { path: ^/api$, roles: PUBLIC_ACCESS }
        
        - { path: ^/api/me/consent, roles: IS_AUTHENTICATED_FULLY }

        # 🔒 PRIVÉ : tout le reste de l’API
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
        
        # ADMIN : User avec role_ADMIN
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }


