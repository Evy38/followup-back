# CI Backend - Intégration Continue
#
# Déclenché automatiquement à chaque push ou pull request sur main.
# Garantit que le code est testé et valide avant toute fusion.
#
# Pipeline :
#   1. Installation des dépendances PHP (Composer)
#   2. Génération des clés JWT pour les tests
#   3. Création et migration de la base de données de test (PostgreSQL)
#   4. Exécution des tests PHPUnit
#   5. Analyse statique du code (PHPStan)

name: CI Backend Symfony

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: follow_user
          POSTGRES_PASSWORD: root
          POSTGRES_DB: followup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U follow_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_pgsql, intl  
          coverage: none

      - name: 📦 Installer les dépendances Composer
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: 🔐 Generate JWT keys for CI
        run: |
          mkdir -p config/jwt
          openssl genrsa -out config/jwt/private.pem 2048
          openssl rsa -in config/jwt/private.pem -pubout -out config/jwt/public.pem

      - name: ⚙️ Préparer l'environnement Symfony
        env:
          APP_ENV: test
          DATABASE_URL: "postgresql://follow_user:root@127.0.0.1:5432/followup_test?serverVersion=16&charset=utf8"  
          MESSENGER_TRANSPORT_DSN: "sync://"
        run: |
          touch .env
          php bin/console cache:clear

      - name: ⏳ Wait for PostgreSQL  
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -U follow_user && break
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: 🗄️ Créer le schéma de base de données
        env:
          APP_ENV: test
          DATABASE_URL: "postgresql://follow_user:root@127.0.0.1:5432/followup_test?serverVersion=16&charset=utf8"  
          MESSENGER_TRANSPORT_DSN: "sync://"
        run: |
          php bin/console doctrine:database:create --if-not-exists
          php bin/console doctrine:migrations:migrate --no-interaction  # ✅ Utiliser migrations au lieu de schema:create

      - name: 🧩 Vérifier le schéma Doctrine
        env:
          APP_ENV: test
          DATABASE_URL: "postgresql://follow_user:root@127.0.0.1:5432/followup_test?serverVersion=16&charset=utf8" 
          MESSENGER_TRANSPORT_DSN: "sync://"
        run: php bin/console doctrine:schema:validate --skip-sync

      - name: 🧪 Lancer les tests PHPUnit
        env:
          APP_ENV: test
          APP_SECRET: "ci_secret"
          DATABASE_URL: "postgresql://follow_user:root@127.0.0.1:5432/followup_test?serverVersion=16&charset=utf8"  # ✅ PostgreSQL
          JWT_PASSPHRASE: ""
          MAILER_DSN: "null://null"
          MESSENGER_TRANSPORT_DSN: "sync://"
          CORS_ALLOW_ORIGIN: "*"
          FRONTEND_URL: "http://localhost:3000"
        run: php bin/phpunit

      - name: 🔍 Analyse statique PHPStan
        run: vendor/bin/phpstan analyse --no-progress