name: CD Backend - Railway

# Déploiement automatique sur Railway après validation du CI.
# Se déclenche uniquement si le CI backend passe avec succès sur main.
# Peut aussi être déclenché manuellement depuis l'onglet Actions sur GitHub.
#
# Prérequis — secrets GitHub à configurer (Settings → Secrets → Actions) :
#   RAILWAY_DEPLOY_HOOK_BACKEND : URL du deploy hook du service "backend" sur Railway
#   RAILWAY_DEPLOY_HOOK_WORKER  : URL du deploy hook du service "worker" sur Railway
#
# Comment obtenir un deploy hook Railway :
#   Dashboard Railway → ton projet → service → Settings → Deploy Hooks → Generate

on:
  # Déclenchement automatique quand le CI passe sur main
  workflow_run:
    workflows: ["CI Backend Symfony"]
    types: [completed]
    branches: [main]

  # Déclenchement manuel depuis GitHub Actions
  workflow_dispatch:

jobs:
  deploy:
    name: Déployer sur Railway
    runs-on: ubuntu-latest

    # En automatique : ne déploie que si le CI a réussi
    # En manuel : toujours déployer
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      HOOK_BACKEND: ${{ secrets.RAILWAY_DEPLOY_HOOK_BACKEND }}
      HOOK_WORKER: ${{ secrets.RAILWAY_DEPLOY_HOOK_WORKER }}

    steps:
      - name: Vérifier la présence des secrets
        run: |
          if [ -z "$HOOK_BACKEND" ]; then
            echo "RAILWAY_DEPLOY_HOOK_BACKEND manquant."
            echo "Va dans Railway → service backend → Settings → Deploy Hooks"
            echo "Copie l'URL et ajoute-la dans GitHub → Settings → Secrets → Actions"
            exit 1
          fi
          if [ -z "$HOOK_WORKER" ]; then
            echo "RAILWAY_DEPLOY_HOOK_WORKER manquant."
            echo "Va dans Railway → service worker → Settings → Deploy Hooks"
            echo "Copie l'URL et ajoute-la dans GitHub → Settings → Secrets → Actions"
            exit 1
          fi

      - name: Déployer le backend
        run: |
          echo "Déclenchement du déploiement backend..."
          curl --fail --silent --show-error -X POST "$HOOK_BACKEND"
          echo "Backend : déploiement déclenché."

      - name: Déployer le worker Messenger
        run: |
          echo "Déclenchement du déploiement worker..."
          curl --fail --silent --show-error -X POST "$HOOK_WORKER"
          echo "Worker : déploiement déclenché."

      - name: Résumé
        run: |
          echo "Les deux services ont été envoyés en déploiement sur Railway."
          echo "Surveille l'avancement ici : https://railway.app/dashboard"
          echo "Les logs sont accessibles dans chaque service → onglet Deployments."
